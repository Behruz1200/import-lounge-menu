<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Lounge — Контроль углей</title>
<style>
  :root{--bg:#0b0c10;--card:#14161e;--line:#232733;--txt:#f2f3f7;--muted:#8b90a0;
    --gold:#ef4444;--gold2:#c01225;--ok:#1fb877;--warn:#f5a623;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{background:var(--bg);color:var(--txt);padding:22px 26px;min-height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  header h1{font-size:30px;font-weight:800;letter-spacing:.5px;}
  header h1 .r{color:var(--gold);}
  header .clock{font-size:26px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;}
  .legend{display:flex;gap:18px;margin-bottom:16px;color:var(--muted);font-size:15px;flex-wrap:wrap;}
  .legend b{color:var(--txt);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .tile{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:20px 22px;
    position:relative;overflow:hidden;transition:.2s;}
  .tile .tname{font-size:26px;font-weight:800;}
  .tile .str{display:inline-block;margin-top:6px;font-size:14px;font-weight:700;padding:4px 12px;border-radius:20px;
    background:rgba(255,255,255,.06);color:var(--muted);}
  .tile .count{font-size:60px;font-weight:800;font-variant-numeric:tabular-nums;margin:10px 0 2px;letter-spacing:1px;}
  .tile .cap{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .tile .sess{margin-top:12px;font-size:15px;color:var(--muted);}
  .tile.ok{border-color:#26303f;}
  .tile.soon{border-color:var(--warn);}
  .tile.due{border-color:var(--gold);background:linear-gradient(160deg,#3a1418,#1a0d10);animation:pulse 1s infinite;}
  .tile.due .count{color:#ff5a5a;}
  .tile.due .cap{color:#ff8a8a;font-weight:800;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.0);}50%{box-shadow:0 0 28px 4px rgba(239,68,68,.55);}}
  .empty{text-align:center;color:var(--muted);font-size:22px;padding:90px 20px;}
  .end{color:var(--warn);font-weight:700;}
</style>
</head>
<body>
  <header>
    <h1>💨 Import <span class="r">Lounge</span> · Контроль углей</h1>
    <div class="clock" id="clock">--:--</div>
  </header>
  <div class="legend">
    <span>🟢 <b>идёт</b></span>
    <span>🟠 <b>скоро угли</b> (≤2 мин)</span>
    <span>🔴 <b>поменять угли</b></span>
    <span style="margin-left:auto;">Лёгкий 20м · Средний 15м · Крепкий 10м · Сеанс ~75м</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">Нет активных кальянов 💨</div>

<script>
const FB="https://import-lounge-default-rtdb.firebaseio.com";
const COAL={light:20*60000, medium:15*60000, strong:10*60000};
const STR_LABEL={light:"Лёгкий 🌿", medium:"Средний ⚖️", strong:"Крепкий 🔥"};
const SESSION=75*60000;          // total session length to flag "ending"
let sessions={};                 // tableId -> {str,name,start,coal}
let lastDue={};                  // tableId -> bool, to beep only on transition

function fmt(ms){
  if(ms<0) ms=0;
  const s=Math.floor(ms/1000), m=Math.floor(s/60), ss=s%60;
  return m+":"+String(ss).padStart(2,"0");
}
let audioCtx;
function beep(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type="square"; o.frequency.value=880; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(.18,audioCtx.currentTime);
    o.start(); o.stop(audioCtx.currentTime+.35);
  }catch(e){}
}

async function load(){
  try{
    const r=await fetch(FB.replace(/\/$/,"")+"/hookah.json",{cache:"no-store"});
    sessions=(await r.json())||{};
  }catch(e){}
}
function render(){
  const now=Date.now();
  const grid=document.getElementById("grid");
  const ids=Object.keys(sessions||{});
  document.getElementById("empty").style.display=ids.length?"none":"block";
  // sort: due first, then by soonest coal change
  ids.sort((a,b)=>{
    const ra=(sessions[a].coal+COAL[sessions[a].str||"medium"])-now;
    const rb=(sessions[b].coal+COAL[sessions[b].str||"medium"])-now;
    return ra-rb;
  });
  grid.innerHTML="";
  ids.forEach(id=>{
    const s=sessions[id]; const intv=COAL[s.str||"medium"];
    const remain=(s.coal+intv)-now;
    const sessRemain=(s.start+SESSION)-now;
    let cls="ok"; if(remain<=0) cls="due"; else if(remain<=120000) cls="soon";
    const due=remain<=0;
    if(due && !lastDue[id]) beep();
    lastDue[id]=due;
    const t=document.createElement("div"); t.className="tile "+cls;
    t.innerHTML=`<div class="tname">${s.name||("Стол "+id)}</div>
      <div class="str">${STR_LABEL[s.str||"medium"]||"Средний"}</div>
      <div class="count">${due?"УГЛИ":fmt(remain)}</div>
      <div class="cap">${due?"🔥 поменять угли":"до смены углей"}</div>
      <div class="sess">Сеанс: ${fmt(Math.max(0,now-s.start))} ${sessRemain<=0?'<span class="end">· завершается</span>':(sessRemain<=10*60000?'<span class="end">· скоро конец</span>':'')}</div>`;
    grid.appendChild(t);
  });
}
function tickClock(){ const d=new Date(); document.getElementById("clock").textContent=
  String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

load().then(render);
setInterval(()=>{ tickClock(); render(); },1000);   // live countdown
setInterval(load,4000);                              // refresh sessions from Firebase
tickClock();
</script>
</body>
</html>
