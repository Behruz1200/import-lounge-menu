<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Lounge — TV</title>
<style>
  :root{--bg:#0b0c10;--card:#14161e;--line:#232733;--txt:#f2f3f7;--muted:#8b90a0;
    --gold:#ef4444;--gold2:#c01225;--ok:#1fb877;--warn:#f5a623;--blue:#3aa0ff;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden;}
  /* ---- main (coal) — fits the screen, no scroll ---- */
  .main{flex:1;min-width:0;padding:16px 20px;overflow:hidden;display:flex;flex-direction:column;}
  header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  header h1{font-size:26px;font-weight:800;letter-spacing:.5px;}
  header h1 .r{color:var(--gold);}
  header .clock{font-size:24px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;}
  .legend{flex:0 0 auto;display:flex;gap:14px;margin-bottom:12px;color:var(--muted);font-size:13px;flex-wrap:wrap;}
  .legend b{color:var(--txt);}
  .grid{flex:1;min-height:0;display:grid;gap:12px;}   /* columns/rows set by JS */
  .tile{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:12px;overflow:hidden;
    display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-height:0;}
  .tile .tname{font-size:22px;font-weight:800;line-height:1.1;}
  .tile .str{display:inline-block;margin-top:5px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
    background:rgba(255,255,255,.06);color:var(--muted);}
  .tile .count{font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;margin:6px 0 2px;letter-spacing:1px;line-height:1;}
  .tile .cap{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .tile .sess{margin-top:8px;font-size:12px;color:var(--muted);}
  .tile.ok{border-color:#26303f;}
  .tile.soon{border-color:var(--warn);}
  .tile.due{border-color:var(--gold);background:linear-gradient(160deg,#3a1418,#1a0d10);animation:pulse 1s infinite;}
  .tile.due .count{color:#ff5a5a;} .tile.due .cap{color:#ff8a8a;font-weight:800;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}50%{box-shadow:0 0 28px 4px rgba(239,68,68,.55);}}
  .empty{flex:1;min-height:0;display:none;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);font-size:clamp(22px,3vw,40px);font-weight:700;}
  .end{color:var(--warn);font-weight:700;}
  /* ---- side (orders + bookings) ---- */
  .side{width:430px;flex:0 0 430px;border-left:1px solid var(--line);background:#0e0f14;
    display:flex;flex-direction:column;}
  .panel{flex:1;min-height:0;padding:16px 16px;overflow-y:auto;}
  .panel + .panel{border-top:1px solid var(--line);}
  .panel h2{font-size:19px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .panel h2 .b{min-width:22px;text-align:center;font-size:13px;padding:2px 8px;border-radius:20px;background:var(--gold);color:#fff;}
  .ncard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;
    animation:in .25s ease;}
  @keyframes in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .ncard.ord{border-left:4px solid var(--gold);}
  .ncard.bk{border-left:4px solid var(--warn);}
  .ncard.bk.conf{border-left:4px solid var(--ok);}
  .ncard .top{display:flex;justify-content:space-between;align-items:baseline;}
  .ncard .top .nm{font-size:18px;font-weight:800;}
  .ncard .top .ago{color:var(--muted);font-size:12px;font-weight:600;}
  .ncard .it{font-size:14px;color:#d7dae2;margin-top:5px;line-height:1.35;}
  .ncard .it .hk{color:var(--gold);font-weight:700;}
  .ncard .tot{margin-top:6px;font-weight:800;color:var(--gold);}
  .pempty{color:var(--muted);font-size:15px;padding:14px 4px;}
</style>
</head>
<body>
  <div class="main">
    <header>
      <h1>💨 Import <span class="r">Lounge</span> · Контроль углей</h1>
      <div class="clock" id="clock">--:--</div>
    </header>
    <div class="legend">
      <span>🟢 <b>идёт</b></span>
      <span>🟠 <b>скоро угли</b> (≤2 мин)</span>
      <span>🔴 <b>поменять угли</b></span>
      <span style="margin-left:auto;">Лёгкий 20м · Средний 15м · Крепкий 10м · Сеанс ~75м</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">Нет активных кальянов 💨</div>
  </div>

  <div class="side" id="side">
    <div class="panel" id="panel-ord">
      <h2>🆕 Заказы <span class="b" id="ordBadge">0</span></h2>
      <div id="ordList"></div>
    </div>
    <div class="panel" id="panel-bk">
      <h2>🍽 Брони <span class="b" id="bkBadge">0</span></h2>
      <div id="bkList"></div>
    </div>
  </div>

<script>
const FB="https://import-lounge-default-rtdb.firebaseio.com";
const base=FB.replace(/\/$/,"");
const COAL={light:20*60000, medium:15*60000, strong:10*60000, test:5000};
const STR_LABEL={light:"Лёгкий 🌿", medium:"Средний ⚖️", strong:"Крепкий 🔥", test:"Тест 🧪"};
const SESSION=75*60000;
let sessions={}, orders={}, bookings={}, lastDue={}, seen=new Set(), first=true;

function fmt(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function money(n){ return (n||0).toLocaleString("ru-RU").replace(/,/g," ")+" so'm"; }
function ago(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60)return s+" сек";
  const m=Math.floor(s/60); if(m<60)return m+" мин"; return Math.floor(m/60)+" ч "+(m%60)+" мин"; }
let actx;
function beep(freq){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain(); o.type="square"; o.frequency.value=freq||880;
  o.connect(g); g.connect(actx.destination); g.gain.setValueAtTime(.16,actx.currentTime);
  o.start(); o.stop(actx.currentTime+.35);}catch(e){} }

async function fetchJSON(path){
  try{
    const c=new AbortController(); const tid=setTimeout(()=>c.abort(),5000);
    const r=await fetch(base+path+"?cb="+Date.now(),{cache:"no-store",signal:c.signal});
    clearTimeout(tid);
    return (await r.json())||{};
  }catch(e){ return null; }   // null = skip this cycle, keep previous data
}
async function loadAll(){
  const h=await fetchJSON("/hookah.json");   if(h!==null) sessions=h;
  const o=await fetchJSON("/orders.json");   if(o!==null) orders=o;
  const b=await fetchJSON("/bookings.json"); if(b!==null) bookings=b;
  // chime on a new order or booking
  let fresh=false;
  Object.keys(orders).forEach(id=>{ if(!seen.has("o"+id)){ seen.add("o"+id); if(!first) fresh=true; } });
  Object.keys(bookings).forEach(id=>{ if(bookings[id].status==="pending" && !seen.has("b"+id)){ seen.add("b"+id); if(!first) fresh=true; } });
  if(fresh) beep(660);
  first=false;
  renderCoal(); renderOrders(); renderBookings();
}

let tileEls={};
function renderCoal(){   // rebuild the grid only when called (from loadAll, every 4s)
  const now=Date.now(); const grid=document.getElementById("grid");
  const ids=Object.keys(sessions||{}).filter(id=>sessions[id]);
  const empty=document.getElementById("empty");
  if(!ids.length){ grid.style.display="none"; grid.innerHTML=""; tileEls={}; empty.style.display="flex"; return; }
  grid.style.display="grid"; empty.style.display="none";
  ids.sort((a,b)=>((sessions[a].coal+COAL[sessions[a].str||"medium"])-now)-((sessions[b].coal+COAL[sessions[b].str||"medium"])-now));
  grid.innerHTML=""; tileEls={};
  ids.forEach(id=>{
    const s=sessions[id];
    const t=document.createElement("div"); t.className="tile ok";
    t.innerHTML=`<div class="tname">${s.name||("Стол "+id)}</div>
      <div class="str">${STR_LABEL[s.str||"medium"]||"Средний"}</div>
      <div class="count">--</div><div class="cap">до смены углей</div>
      <div class="sess"></div>`;
    grid.appendChild(t); tileEls[id]=t;
  });
  layoutCoal();
  tickCoal();
}
function layoutCoal(){
  const grid=document.getElementById("grid");
  const n=Object.keys(tileEls).length; if(!n) return;
  // Pin the grid to the exact remaining viewport height so it never scrolls.
  const rect=grid.getBoundingClientRect();
  const h=Math.max(0, window.innerHeight - rect.top - 16);
  grid.style.height=h+"px";
  const gap=12, w=grid.clientWidth;
  if(w<=0||h<=0) return;
  // largest tile up to the max card size that still fits everything on screen
  const maxW=320, maxH=200;
  let bestW=0, cols=1;
  for(let c=1;c<=n;c++){
    const r=Math.ceil(n/c);
    const wFit=(w-(c-1)*gap)/c;
    const hFit=(h-(r-1)*gap)/r;
    const tw=Math.min(wFit, hFit*(maxW/maxH), maxW);
    if(tw>bestW){ bestW=tw; cols=c; }
  }
  const tileW=Math.max(60,bestW), tileH=tileW*(maxH/maxW);
  grid.style.gridTemplateRows="";
  grid.style.gridTemplateColumns=`repeat(${cols}, ${tileW}px)`;
  grid.style.gridAutoRows=`${tileH}px`;
  grid.style.justifyContent="center";
  grid.style.alignContent="center";
  // fonts scale with the (capped) tile size — cap at the nice original sizes
  const cnt=Math.max(16, Math.min(tileH*0.28, 56));
  const nm =Math.max(12, Math.min(tileH*0.12, 24));
  const sm =Math.max(9,  Math.min(tileH*0.065, 13));
  Object.values(tileEls).forEach(el=>{
    el.style.padding=Math.max(8,tileH*0.08)+"px "+Math.max(10,tileW*0.06)+"px";
    el.querySelector(".tname").style.fontSize=nm+"px";
    el.querySelector(".count").style.fontSize=cnt+"px";
    el.querySelector(".str").style.fontSize=sm+"px";
    el.querySelector(".cap").style.fontSize=sm+"px";
    el.querySelector(".sess").style.fontSize=sm+"px";
  });
}
window.addEventListener("resize", layoutCoal);
function tickCoal(){     // update countdowns in place (every 1s, lightweight)
  const now=Date.now();
  Object.keys(tileEls).forEach(id=>{
    const s=sessions[id]; if(!s) return;
    const intv=COAL[s.str||"medium"];
    const remain=(s.coal+intv)-now, sessRemain=(s.start+SESSION)-now;
    const due=remain<=0; let cls="tile "+(due?"due":(remain<=120000?"soon":"ok"));
    if(due && !lastDue[id]) beep(880); lastDue[id]=due;
    const el=tileEls[id];
    if(el.className!==cls) el.className=cls;
    el.querySelector(".count").textContent=due?"УГЛИ":fmt(remain);
    el.querySelector(".cap").textContent=due?"🔥 поменять угли":"до смены углей";
    el.querySelector(".sess").innerHTML="Сеанс: "+fmt(Math.max(0,now-s.start))+
      (sessRemain<=0?' <span class="end">· завершается</span>':(sessRemain<=10*60000?' <span class="end">· скоро конец</span>':''));
  });
}

function updateSide(){
  const o=document.getElementById("panel-ord").style.display!=="none";
  const b=document.getElementById("panel-bk").style.display!=="none";
  document.getElementById("side").style.display=(o||b)?"flex":"none";
}
function renderOrders(){
  const v=document.getElementById("ordList");
  const ids=Object.keys(orders).filter(id=>orders[id] && orders[id].status!=="done")
              .sort((a,b)=>(orders[b].ts||0)-(orders[a].ts||0));
  document.getElementById("ordBadge").textContent=ids.length;
  document.getElementById("panel-ord").style.display=ids.length?"":"none";  // hide if empty
  updateSide();
  if(!ids.length){ v.innerHTML=""; return; }
  v.innerHTML="";
  ids.forEach(id=>{
    const o=orders[id];
    const items=(o.items||[]).map(it=>`<div class="it">${it.h?'<span class="hk">💨 </span>':''}${it.n} ×${it.q}`+(it.o?` · ${it.o}`:"")+`</div>`).join("");
    const c=document.createElement("div"); c.className="ncard ord";
    c.innerHTML=`<div class="top"><span class="nm">🪑 ${o.name||o.table}</span><span class="ago">${ago(o.ts||Date.now())} назад</span></div>`+
      items+`<div class="tot">${money(o.total)}</div>`;
    v.appendChild(c);
  });
}

function renderBookings(){
  const v=document.getElementById("bkList");
  const ids=Object.keys(bookings||{});
  ids.sort((a,b)=>(bookings[a].date+bookings[a].time).localeCompare(bookings[b].date+bookings[b].time));
  ids.sort((a,b)=>(bookings[a].status==="pending"?0:1)-(bookings[b].status==="pending"?0:1));
  const pend=ids.filter(id=>bookings[id].status==="pending").length;
  document.getElementById("bkBadge").textContent=pend;
  document.getElementById("panel-bk").style.display=ids.length?"":"none";   // hide if empty
  updateSide();
  if(!ids.length){ v.innerHTML=""; return; }
  v.innerHTML="";
  ids.forEach(id=>{
    const b=bookings[id]; const conf=b.status==="confirmed";
    const c=document.createElement("div"); c.className="ncard bk"+(conf?" conf":"");
    c.innerHTML=`<div class="top"><span class="nm">🪑 ${b.table||"-"} ${conf?"✅":"🆕"}</span><span class="ago">${b.date} ${b.time}</span></div>`+
      `<div class="it">👤 ${b.name||"-"} · 👥 ${b.guests||"-"}</div>`+(b.phone?`<div class="it">☎️ ${b.phone}</div>`:"");
    v.appendChild(c);
  });
}

function tickClock(){ const d=new Date(); document.getElementById("clock").textContent=
  String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

loadAll();
setTimeout(layoutCoal,400); setTimeout(layoutCoal,1500);   // re-fit once dimensions settle
setInterval(tickClock,1000);
setInterval(tickCoal,1000);     // live coal countdown (in-place, lightweight)
setInterval(loadAll,4000);      // refresh data from Firebase + reconcile lists
tickClock();
</script>
</body>
</html>
